name: Update RouterOS allow_ips

on:
  workflow_dispatch:
  schedule:
    # UTC 19:17 = 北京时间次日 03:17，每天执行一次。
    - cron: "17 19 * * *"

permissions:
  contents: write

concurrency:
  group: update-routeros-allow-ips
  cancel-in-progress: true

jobs:
  update-allow-ips:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate generator syntax
        run: python -m py_compile generate_allow_ips.py

      - name: Generate allow_ips files
        run: python generate_allow_ips.py

      - name: Show generated file information
        run: |
          ls -lh dist/allow_ips.rsc dist/allow_ips.meta.json dist/last_check.json
          echo "----- allow_ips.rsc head -----"
          head -n 3 dist/allow_ips.rsc
          echo "----- allow_ips.rsc tail -----"
          tail -n 5 dist/allow_ips.rsc
          echo "----- allow_ips.meta.json -----"
          cat dist/allow_ips.meta.json
          echo "----- last_check.json -----"
          cat dist/last_check.json

      - name: Commit daily check and generated files
        id: commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add dist/allow_ips.rsc dist/allow_ips.meta.json dist/last_check.json

          if git diff --cached --quiet -- dist/allow_ips.rsc; then
            echo "rsc_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "rsc_changed=true" >> "$GITHUB_OUTPUT"
          fi

          if git diff --cached --quiet; then
            echo "No files changed; nothing to commit."
          else
            git commit -m "Daily allow_ips source check"
            git push
          fi

      - name: Best-effort purge jsDelivr cache
        if: steps.commit.outputs.rsc_changed == 'true'
        run: |
          RSC_PURGE_URL="https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/dist/allow_ips.rsc"
          META_PURGE_URL="https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/dist/allow_ips.meta.json"
          echo "Purge RSC: ${RSC_PURGE_URL}"
          curl -fsSL "${RSC_PURGE_URL}" || true
          echo "Purge META: ${META_PURGE_URL}"
          curl -fsSL "${META_PURGE_URL}" || true

      - name: Display current jsDelivr version without failing workflow
        run: |
          JSDELIVR_URL="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/dist/allow_ips.rsc"
          echo "jsDelivr URL: ${JSDELIVR_URL}"
          curl -fsSL "${JSDELIVR_URL}" -o /tmp/allow_ips_from_jsdelivr.rsc || true
          if [ -s /tmp/allow_ips_from_jsdelivr.rsc ]; then
            head -n 1 /tmp/allow_ips_from_jsdelivr.rsc
          else
            echo "NOTICE: jsDelivr file is temporarily unavailable; repository generation remains successful."
          fi
