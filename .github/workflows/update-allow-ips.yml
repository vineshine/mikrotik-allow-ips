name: Update RouterOS allow_ips

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions 的 schedule 使用 UTC。
    # 这里对应北京时间 03:17、09:17、15:17、21:17。
    - cron: "17 19,1,7,13 * * *"

permissions:
  contents: write

concurrency:
  group: update-routeros-allow-ips
  cancel-in-progress: true

jobs:
  update-allow-ips:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate allow_ips.rsc
        run: python generate_allow_ips.py

      - name: Read generated metadata
        id: meta
        run: |
          GENERATED_AT=$(python - <<'PY'
          import json
          with open("dist/allow_ips.meta.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          print(data["generated_at"])
          PY
          )

          echo "generated_at=${GENERATED_AT}" >> "$GITHUB_OUTPUT"
          echo "Generated at: ${GENERATED_AT}"

      - name: Show generated file info
        run: |
          ls -lh dist/allow_ips.rsc dist/allow_ips.meta.json
          echo "----- allow_ips.rsc head -----"
          head -n 5 dist/allow_ips.rsc
          echo "----- allow_ips.rsc tail -----"
          tail -n 8 dist/allow_ips.rsc
          echo "----- allow_ips.meta.json -----"
          cat dist/allow_ips.meta.json

      - name: Commit generated files if changed
        id: commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add dist/allow_ips.rsc dist/allow_ips.meta.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update allow_ips.rsc"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Purge jsDelivr cache
        run: |
          RSC_PURGE_URL="https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/dist/allow_ips.rsc"
          META_PURGE_URL="https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/dist/allow_ips.meta.json"

          echo "Purge RSC: ${RSC_PURGE_URL}"
          curl -fsSL "${RSC_PURGE_URL}"

          echo "Purge META: ${META_PURGE_URL}"
          curl -fsSL "${META_PURGE_URL}"

      - name: Verify jsDelivr is fresh
        run: |
          JSDELIVR_RSC_URL="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/dist/allow_ips.rsc"
          EXPECTED_GENERATED_AT="${{ steps.meta.outputs.generated_at }}"

          echo "Expected generated_at: ${EXPECTED_GENERATED_AT}"
          echo "Verify URL: ${JSDELIVR_RSC_URL}"

          for i in $(seq 1 24); do
            echo "Check attempt ${i}/24"

            curl -fsSL "${JSDELIVR_RSC_URL}" -o /tmp/allow_ips.rsc

            echo "Current first line:"
            head -n 1 /tmp/allow_ips.rsc

            if grep -q "${EXPECTED_GENERATED_AT}" /tmp/allow_ips.rsc; then
              echo "jsDelivr cache is fresh."
              exit 0
            fi

            echo "jsDelivr is still stale, wait 10s..."
            sleep 10
          done

          echo "ERROR: jsDelivr is still stale after 240 seconds."
          exit 1
